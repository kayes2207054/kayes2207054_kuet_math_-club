<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">KUET Math Club Poster</title>
  <desc id="desc">A stylized math club poster with neon mathematical motifs and event title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04040a"/>
      <stop offset="45%" stop-color="#14193a"/>
      <stop offset="75%" stop-color="#0d6b6f"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#7cf7ff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#8a5cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: 1px; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 6px; }
      .eq { font-family: 'Times New Roman', serif; font-style: italic; fill: #d9f8ff; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #cfefff; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="600" cy="500" r="430" fill="url(#glow)" filter="url(#blur)" opacity="0.9"/>

  <g opacity="0.55">
    <circle cx="170" cy="230" r="5" fill="#7df9ff"/>
    <circle cx="245" cy="160" r="4" fill="#b17cff"/>
    <circle cx="980" cy="180" r="5" fill="#7df9ff"/>
    <circle cx="1040" cy="285" r="4" fill="#ffd36a"/>
    <circle cx="145" cy="860" r="4" fill="#ffd36a"/>
    <circle cx="1060" cy="905" r="5" fill="#7df9ff"/>
  </g>

  <g filter="url(#shadow)">
    <text x="600" y="150" text-anchor="middle" class="small" font-size="26">KUET MATH CLUB PRESENTS</text>
    <text x="600" y="245" text-anchor="middle" class="title" font-size="74" fill="#f84f8a">MULTIVERSE OF MATHNESS 2.0</text>
    <text x="600" y="320" text-anchor="middle" class="sub" font-size="20" fill="#9be7ff">A CELEBRATION OF PROBLEM SOLVING</text>
  </g>

  <g opacity="0.9">
    <path d="M115 930 C250 830, 365 820, 520 885 S860 1020, 1090 875" fill="none" stroke="#45f2ff" stroke-width="2" opacity="0.5"/>
    <path d="M90 780 C240 690, 355 690, 510 760 S865 930, 1130 760" fill="none" stroke="#b17cff" stroke-width="2" opacity="0.35"/>
  </g>

  <g fill="none" stroke="#95f7ff" stroke-opacity="0.9" stroke-width="3">
    <polygon points="210,420 265,390 325,418 325,484 265,514 210,486"/>
    <polygon points="920,360 970,330 1028,360 1028,425 970,455 920,425"/>
    <polygon points="150,620 200,590 250,620 250,680 200,710 150,680"/>
    <polygon points="930,700 980,670 1030,700 1030,760 980,790 930,760"/>
    <polygon points="555,410 600,380 645,410 645,465 600,495 555,465"/>
  </g>

  <g fill="none" stroke="#fbbf24" stroke-opacity="0.8" stroke-width="3">
    <circle cx="330" cy="690" r="72"/>
    <circle cx="870" cy="560" r="92"/>
    <circle cx="600" cy="760" r="128"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="385" y="505" width="430" height="240" rx="24" fill="rgba(7,15,32,0.6)" stroke="#7cf7ff" stroke-opacity="0.25"/>
    <text x="600" y="575" text-anchor="middle" class="title" font-size="38" fill="#e8ffff">KUET Math Club</text>
    <text x="600" y="620" text-anchor="middle" class="eq" font-size="42">∫ f(x) dx = F(x) + C</text>
    <text x="600" y="670" text-anchor="middle" class="eq" font-size="30">a² + b² = c²</text>
    <text x="600" y="716" text-anchor="middle" class="small" font-size="18">WORKSHOPS • OLYMPIAD • SEMINARS • COMMUNITY</text>
  </g>

  <g opacity="0.95">
    <text x="140" y="380" class="eq" font-size="28">Σ n = n(n+1)/2</text>
    <text x="850" y="310" class="eq" font-size="30">f(x) = x² + 2x + 1</text>
    <text x="180" y="820" class="eq" font-size="30">∑ 1/n² = π²/6</text>
    <text x="810" y="860" class="eq" font-size="34">e^{iπ} + 1 = 0</text>
  </g>

  <g opacity="0.8">
    <path d="M450 850 l50 -80 l50 80" fill="none" stroke="#ffd36a" stroke-width="3"/>
    <path d="M750 820 l45 -74 l45 74" fill="none" stroke="#ffd36a" stroke-width="3"/>
  </g>
</svg>